<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Ecofin blog cover template</title>
  <desc>Figma-importable 16:9 article cover template for Ecofin blog posts. Replace title, subtitle, category, series, and part.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFEFB"/>
      <stop offset="0.62" stop-color="#F8FCF9"/>
      <stop offset="1" stop-color="#F3FAF7"/>
    </linearGradient>
    <linearGradient id="soft-green" x1="760" y1="230" x2="1760" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDF6EC" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#FFFEFB" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" stroke="#0F172A" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <circle cx="1410" cy="600" r="520" fill="url(#soft-green)"/>

  <!-- Top brand mark, simplified vector -->
  <g id="logo-mark" transform="translate(120 96) rotate(45 56 56)">
    <rect x="0" y="18" width="82" height="82" rx="4" fill="#0F172A"/>
    <rect x="46" y="18" width="82" height="82" rx="4" fill="none" stroke="#D6A23A" stroke-width="14"/>
    <rect x="104" y="18" width="82" height="82" rx="4" fill="#D6A23A"/>
  </g>

  <!-- Header labels -->
  <text x="120" y="192" font-family="Source Sans 3, Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="4" fill="#065F46">CATEGORY</text>
  <text x="120" y="238" font-family="Source Sans 3, Inter, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="3" fill="#64748B">SERIES · PART 1</text>

  <!-- Main headline block -->
  <rect x="120" y="315" width="12" height="410" rx="6" fill="#065F46"/>
  <text x="168" y="388" font-family="Lora, Georgia, serif" font-size="92" font-weight="600" fill="#0F172A">
    <tspan x="168" dy="0">Article Title</tspan>
    <tspan x="168" dy="112">Goes Here</tspan>
  </text>
  <text x="168" y="660" font-family="Source Sans 3, Inter, Arial, sans-serif" font-size="34" font-weight="500" fill="#334155">
    <tspan x="168" dy="0">Optional short subtitle or key question.</tspan>
    <tspan x="168" dy="48">Keep it plain and concrete.</tspan>
  </text>

  <!-- Right-side concept card placeholder -->
  <g id="concept-card" filter="url(#card-shadow)">
    <rect x="1160" y="270" width="520" height="420" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="1216" y="326" width="408" height="84" rx="18" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="2"/>
    <text x="1250" y="378" font-family="Source Sans 3, Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#065F46">CONCEPT VISUAL</text>
    <path d="M1220 580C1300 510 1376 612 1450 534C1515 466 1566 500 1620 440" stroke="#065F46" stroke-width="10" stroke-linecap="round"/>
    <path d="M1220 580C1300 510 1376 612 1450 534C1515 466 1566 500 1620 440" stroke="#D6A23A" stroke-width="4" stroke-linecap="round" stroke-dasharray="14 18"/>
    <circle cx="1220" cy="580" r="14" fill="#065F46"/>
    <circle cx="1450" cy="534" r="14" fill="#065F46"/>
    <circle cx="1620" cy="440" r="14" fill="#065F46"/>
    <rect x="1220" y="638" width="400" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="1220" y="638" width="245" height="10" rx="5" fill="#065F46"/>
  </g>

  <!-- Footer -->
  <text x="120" y="966" font-family="Source Sans 3, Inter, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="2" fill="#065F46">BLOG.ECOFIN.UZ</text>
  <text x="1680" y="966" text-anchor="end" font-family="Lora, Georgia, serif" font-size="48" font-weight="600" fill="#0F172A">Ecofin</text>

  <!-- Safe area guide: keep hidden or delete before export if desired -->
  <rect x="96" y="72" width="1728" height="936" rx="16" fill="none" stroke="#065F46" stroke-opacity="0.10" stroke-width="2" stroke-dasharray="16 16"/>
</svg>
